<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositorio de Enlaces - Crítico</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #00e5ff;
            --border: #334155;
            --hover-bg: #2d3748;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--accent);
            margin: 0;
            letter-spacing: -1px;
        }

        header p {
            color: var(--text-dim);
            margin-top: 10px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            /* Definición clara de 2 columnas */
            grid-template-columns: repeat(2, 1fr);
            /* Espaciado generoso para evitar solapamientos visuales */
            gap: 30px;
            align-items: start;
        }

        /* Adaptación para móviles: 1 columna */
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
                max-width: 600px;
            }
        }

        .block {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            /* Quitamos height fijo para que el grid gestione el espacio */
            min-width: 0; /* Evita que el contenido desborde el ancho del grid */
            box-sizing: border-box;
        }

        .block:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .block h2 {
            font-size: 1.25rem;
            margin-top: 0;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent);
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            /* Limitamos la altura máxima interna para que el bloque no crezca infinitamente */
            max-height: 400px; 
            overflow-y: auto;
            padding-right: 8px;
        }

        /* Scrollbar personalizado */
        .link-list::-webkit-scrollbar {
            width: 6px;
        }
        .link-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .link-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
        .link-list::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        .link-item {
            display: flex;
            align-items: center;
            background: rgba(15, 23, 42, 0.4);
            padding: 12px 14px;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .link-item:hover {
            background: var(--hover-bg);
            border-color: var(--accent);
            padding-left: 18px;
        }

        .link-item svg {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            color: var(--accent);
            flex-shrink: 0;
        }

        .link-text {
            flex-grow: 1;
            font-size: 0.9rem;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .badge {
            font-size: 0.65rem;
            background: var(--accent);
            color: #0f172a;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Mis Repositorios</h1>
        <p>Panel de control optimizado (Cuadrícula 2x2)</p>
    </header>


        <!-- BLOQUE 4 -->

    <footer style="margin-top: 50px; color: var(--text-dim); font-size: 0.8rem; text-align: center; width: 100%;">
